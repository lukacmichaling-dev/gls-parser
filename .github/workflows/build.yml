name: Build GLS Parser

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller openpyxl PyQt5

      - name: Build Mac .app
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --name "GLS Parser" \
            gls_parser.py

      - name: Zip Mac app
        run: |
          cd dist
          zip -r "GLS_Parser_Mac.zip" "GLS Parser"

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLS_Parser_Mac
          path: dist/GLS_Parser_Mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller openpyxl PyQt5

      - name: Build Windows .exe
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name "GLS_Parser" `
            gls_parser.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLS_Parser_Windows
          path: dist/GLS_Parser.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: GLS_Parser_Mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: GLS_Parser_Windows

      - name: Delete existing latest release
        run: |
          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          git -c http.extraHeader="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            ls-remote --tags origin | grep "refs/tags/latest" | \
            xargs -I{} gh api -X DELETE /repos/${{ github.repository }}/git/{} 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "GLS Parser – najnovšia verzia"
          body: |
            ## Stiahnutie

            | Platforma | Súbor |
            |-----------|-------|
            | 🍎 Mac    | `GLS_Parser_Mac.zip` – rozbaliť a spustiť .app |
            | 🪟 Windows | `GLS_Parser.exe` – spustiť priamo |

            ---
            *Automaticky zostavené z posledného commitu.*
          files: |
            GLS_Parser_Mac.zip
            GLS_Parser.exe
          prerelease: false
